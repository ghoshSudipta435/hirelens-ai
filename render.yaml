services:
  - type: web
    name: hirelens-ai-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run db:generate --workspace backend && npm run build --workspace backend
    startCommand: npm run start --workspace backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
