name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w backend

      - name: Lint check
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: TypeScript check (backend)
        run: npm run typecheck -w backend

      - name: TypeScript check (frontend)
        run: npm run typecheck -w frontend

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w backend

      - name: Run backend tests
        run: npm test -w backend
        env:
          NODE_ENV: test
          CLIENT_ORIGIN: http://localhost:3000
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-at-least-32-characters-long
          LOG_LEVEL: silent
          DATABASE_URL: postgresql://placeholder:password@localhost:5432/hirelens?sslmode=require
          DIRECT_URL: postgresql://placeholder:password@localhost:5432/hirelens?sslmode=require

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Run frontend tests
        run: npm test -w frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
